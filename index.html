<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIC Recruitment SaaS Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0b0b1a;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:220px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(270deg,#6a0dad,#ffcc00,#4b0082);
background-size:600% 600%;
animation:move 8s ease infinite;
}

@keyframes move{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* PROFILE IMAGE */
.profile-img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
display:block;
margin:-70px auto 10px auto;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

/* SECTION */
.section{
padding:20px;
text-align:center;
}

/* CARD */
.card{
display:inline-block;
background:#1a1a2e;
padding:15px;
margin:10px;
border-radius:15px;
width:220px;
}

/* COUNTER */
.counter{
font-size:35px;
font-weight:bold;
color:#ffcc00;
}

/* INPUT */
input,textarea{
width:80%;
padding:10px;
margin:8px;
border:none;
border-radius:5px;
}

/* BUTTON */
.btn{
background:#ffcc00;
color:black;
padding:12px 20px;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

/* ADMIN */
.admin{
background:#111827;
margin:15px;
padding:20px;
border-radius:15px;
}

/* FLOAT DOCK */
.dock{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:12px;
z-index:999;
}

.dock a{
text-decoration:none;
padding:14px 20px;
border-radius:50px;
font-weight:bold;
color:white;
animation:pulse 2s infinite;
}

.dock .wa{background:#25D366;}
.dock .call{background:#ffcc00;color:black;}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:#0f0f2a;
}

@media(max-width:600px){
.card{width:90%;}
input,textarea{width:90%;}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>🚀 LIC Recruitment SaaS Portal</h1>
</div>

<!-- PROFILE -->
<div class="section">
<img src="images/myphoto.jpg" class="profile-img">
<h2 id="name">Niranjan Sahu</h2>
<p>Senior Business Associate (LIC)</p>
<p>📞 7978222099</p>
</div>

<!-- DASHBOARD -->
<div class="section">

<div class="card">
<div id="visits" class="counter">0</div>
<p>Total Visits</p>
</div>

<div class="card">
<div id="clicks" class="counter">0</div>
<p>Total Clicks</p>
</div>

<div class="card">
<div id="agents" class="counter">100+</div>
<p>Active Agents</p>
</div>

<div class="card">
<div id="exp" class="counter">13+</div>
<p>Experience</p>
</div>

</div>

<!-- ADMIN PANEL -->
<div class="section admin">
<h2>🛠 Admin Panel</h2>

<input type="number" id="agentInput" placeholder="Update Agents">
<input type="number" id="expInput" placeholder="Update Experience">

<br>
<button class="btn" onclick="updateAdmin()">Update Dashboard</button>
</div>

<!-- APPLY -->
<div class="section">
<h2>Apply Now</h2>

<input type="text" id="userName" placeholder="Your Name"><br>
<input type="text" id="mobile" placeholder="Mobile Number"><br>
<textarea placeholder="Message"></textarea><br>

<button class="btn" onclick="sendWA()">Send WhatsApp</button>
</div>

<!-- FLOAT DOCK -->
<div class="dock">
<a href="tel:7978222099" class="call">📞 Call</a>
<a href="https://wa.me/917978222099" class="wa" target="_blank">💬 WhatsApp</a>
</div>

<!-- FOOTER -->
<footer>
© LIC Recruitment SaaS Portal
</footer>

<script>

/* SAFE INITIALIZATION */
window.onload=function(){

/* VISITS */
let v = Number(localStorage.getItem("visits") || 0);
v++;
localStorage.setItem("visits", v);
document.getElementById("visits").innerText = v;

/* CLICK TRACK */
let c = Number(localStorage.getItem("clicks") || 0);

document.body.addEventListener("click", function(e){
if(e.target.tagName === "BUTTON" || e.target.tagName === "A"){
c++;
localStorage.setItem("clicks", c);
document.getElementById("clicks").innerText = c;
}
});

document.getElementById("clicks").innerText = c;

};

/* ADMIN UPDATE */
function updateAdmin(){

let ag=document.getElementById("agentInput").value;
let ex=document.getElementById("expInput").value;

if(ag!==""){
document.getElementById("agents").innerText=ag+"+";
}

if(ex!==""){
document.getElementById("exp").innerText=ex+"+";
}

alert("Dashboard Updated Successfully");
}

/* WHATSAPP */
function sendWA(){
let name=document.getElementById("userName").value;
let msg="Hello, I am "+name+" interested in LIC Recruitment";
window.open("https://wa.me/917978222099?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
