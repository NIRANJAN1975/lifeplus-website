<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifePlus LIC Recruitment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(-45deg, #6a0dad, #b266ff, #4b0082);
    color:white;
}

/* WATERMARK */
body::before {
    content:"";
    position:fixed;
    top:50%;
    left:50%;
    width:300px;
    height:300px;
    background:url('images/lic-logo.png') no-repeat center;
    background-size:contain;
    opacity:0.08;
    transform:translate(-50%, -50%);
}

/* TOP BAR */
.topbar {
    background:yellow;
    color:black;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

/* BANNER */
.banner {
    text-align:center;
    padding:30px;
}
.banner img {
    width:150px;
    height:150px;
    border-radius:50%;
    border:5px solid white;
}

/* SECTION */
.section {
    padding:30px;
    text-align:center;
}

/* CARD */
.card {
    display:inline-block;
    background:rgba(255,255,255,0.1);
    padding:20px;
    margin:10px;
    border-radius:15px;
}

/* COUNTER */
.counter {
    font-size:40px;
    font-weight:bold;
}

/* BUTTON */
.btn {
    background:white;
    color:purple;
    padding:12px 20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* FORM */
input, textarea {
    width:80%;
    padding:10px;
    margin:10px;
    border-radius:5px;
    border:none;
}

/* FLOATING WHATSAPP */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:22px;
    text-decoration:none;
}

/* QR */
.qr {
    width:120px;
    margin-top:10px;
}

footer {
    background:#2e0057;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
🚀 Join LIC Today | Unlimited Income Opportunity
</div>

<div class="banner">
    <img id="preview" src="images/myphoto.jpg">
    <h1 id="nameTitle">Niranjan Sahu</h1>
    <p>Senior Business Associate (LIC)</p>
    <p>📞 7978222099</p>

    <input type="file" onchange="loadPhoto(event)" class="btn">
</div>

<!-- COUNTERS -->
<div class="section">
    <div class="card">
        <div id="agents" class="counter">0</div>
        <p id="agentsText">Active Agents</p>
    </div>
    <div class="card">
        <div id="exp" class="counter">0</div>
        <p id="expText">Years Experience</p>
    </div>
</div>

<!-- WHY JOIN -->
<div class="section">
    <h2 id="why">Why Join LIC?</h2>
    <div class="card">💰 Unlimited Income</div>
    <div class="card">⏰ Flexible Work</div>
    <div class="card">📈 High Growth</div>
    <div class="card">🔒 Secure Future</div>
</div>

<!-- APPLY -->
<div class="section">
    <h2 id="apply">Apply Now</h2>
    <input type="text" id="name" placeholder="Your Name"><br>
    <input type="text" id="mobile" placeholder="Mobile Number"><br>
    <textarea id="msg" placeholder="Your Message"></textarea><br>
    <button class="btn" onclick="sendWhatsApp()" id="sendBtn">Send on WhatsApp</button>
</div>

<!-- QR -->
<div class="section">
    <h3>Scan & Apply</h3>
    <img src="images/qr.png" class="qr">
</div>

<!-- LANGUAGE -->
<div class="section">
    <button class="btn" onclick="lang('en')">English</button>
    <button class="btn" onclick="lang('od')">ଓଡ଼ିଆ</button>
</div>

<footer id="footer">
© LifePlus LIC Recruitment
</footer>

<!-- FLOATING BUTTON -->
<a class="whatsapp" href="https://wa.me/917978222099" target="_blank">💬</a>

<script>
function loadPhoto(e){
    document.getElementById('preview').src = URL.createObjectURL(e.target.files[0]);
}

function sendWhatsApp(){
    let name = document.getElementById('name').value;
    let msg = name + " wants to join LIC";
    window.open("https://wa.me/917978222099?text="+encodeURIComponent(msg));
}

/* COUNTER */
function counter(id, target){
let c=0;
let i=setInterval(()=>{
c++;
document.getElementById(id).innerText=c+"+";
if(c>=target) clearInterval(i);
},20);
}
counter("agents",100);
counter("exp",13);

/* LANGUAGE */
function lang(l){
if(l=="od"){
document.getElementById("why").innerText="LIC କାହିଁକି ଯୋଗଦିଅନ୍ତୁ?";
document.getElementById("apply").innerText="ଆବେଦନ କରନ୍ତୁ";
document.getElementById("sendBtn").innerText="WhatsApp ରେ ପଠାନ୍ତୁ";
document.getElementById("agentsText").innerText="ସକ୍ରିୟ ଏଜେଣ୍ଟ";
document.getElementById("expText").innerText="ବର୍ଷର ଅନୁଭବ";
document.getElementById("footer").innerText="© LifePlus LIC ନିଯୁକ୍ତି";
}
else{
document.getElementById("why").innerText="Why Join LIC?";
document.getElementById("apply").innerText="Apply Now";
document.getElementById("sendBtn").innerText="Send on WhatsApp";
document.getElementById("agentsText").innerText="Active Agents";
document.getElementById("expText").innerText="Years Experience";
document.getElementById("footer").innerText="© LifePlus LIC Recruitment";
}
}
</script>

</body>
</html>
